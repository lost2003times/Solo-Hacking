<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyber System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-highest": "#353534",
              "surface": "#131313",
              "secondary": "#68dbae",
              "error": "#ffb4ab",
              "on-surface-variant": "#c8c4d4",
              "outline": "#928f9d",
              "primary": "#c5c0ff",
              "tertiary": "#ffb95d",
              "surface-container": "#201f1f",
              "outline-variant": "#474552",
              "surface-container-low": "#1c1b1b"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Space Grotesk"],
              "mono": ["JetBrains Mono"]
            }
          }
        }
      }
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
      .streak-solid { border-left: 2px solid #7F77DD; }
      .streak-dashed { border-left: 2px dashed #333333; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body class="bg-[#0A0A0A] text-[#e5e2e1] font-body selection:bg-primary selection:text-[#2a1c84] min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
